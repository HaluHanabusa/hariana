# プロファイル: 個人開発者 (AD-01の実例。ブランチではなくこのファイルで切り替える)
persona: individual
initial_prompt_hints:
  - "資金は趣味予算(月数万円)、時間は週末のみを前提とする"
  - "MVPは1〜2週間で検証可能な粒度に落とす"
constraints:
  economic:
    - "初期投資 ≤ 10万円"
    - "ランニングコスト ≤ 5000円/月"
  legal:
    - "特定商取引法の表示義務(有料化する場合)"
default_skills:
  - morphological-analysis
  - first-principles
  - triz
  - frugal-innovation
output_templates:
  design_coordinate: lean-mvp      # 週末MVP要件(リーンスタートアップ形式)
  research_gap: research-plan      # 研究ギャップ型は研究計画書で出す
hitl_gate: post-proposal    # red-team通過候補は自動で企画書化まで進める

# 数値しきい値はすべてここで調整する(値は既定値。運用実績に応じて変更してよい。
# 変更したらEXTRACTION_PROTOCOL表4に理由を記録すること)
thresholds:
  max_proposals_per_cycle: 3      # 1サイクルの企画書生成上限(ランク付き)
  claims_before_synthesis: 5      # Matrix更新を起動するClaim蓄積数
  generalization_repeat_count: 2  # パターンを汎用化する最低再発回数(2回ルール)
  red_team_screening_interval: 5
  morph_max_combinations: 60  # 形態分析の直積の上限(超えたら軸を分割)  # 行が何本増えるごとに早期スクリーニングを行うか
